<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دانلود رابطه فاب</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:tahoma,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    width:90%;
    max-width:450px;
    background:#1f1f1f;
    border-radius:15px;
    padding:25px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}
.bar{
    width:100%;
    height:18px;
    background:#333;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}
.fill{
    width:0%;
    height:100%;
    background:#4CAF50;
    animation:load 3s forwards;
}
@keyframes load{
    to{width:100%;}
}
#text{
    display:none;
    line-height:2;
    font-size:18px;
}
</style>
</head>

<body>

<div class="box">
    <h2>در حال دانلود...</h2>

    <div class="bar">
        <div class="fill"></div>
    </div>

    <div id="text">
        ✅ <b>تبریک! فایل با موفقیت دانلود شد.</b>
        <br><br>
        فقط یه نکته کوچیک مونده...
        <br><br>
        لینکه دانلود رابطه فاب، بعدیا وقتی دیدمت بهت میدم.
        <br><br>
        <b>پس کی اوکیی ببینمت؟ 😉</b>
    </div>
</div>

<script>
setTimeout(()=>{
    document.querySelector("h2").innerText="██████████ 100٪";
    document.getElementById("text").style.display="block";
},3000);
</script>

</body>
</html>
